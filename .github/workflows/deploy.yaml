name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4

      # 【新增这一步】强制使用 Node.js v22
      - name: Setup Node.js v22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm" # 顺便开启缓存，下次打包会快很多

      - name: Install, build, and upload your site
        uses: withastro/action@v3
        with:
          # 告诉 Astro 插件不需要它再去重复安装 Node 了
          node-version: 22

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
#    steps:
     # - name: Deploy to GitHub Pages
      #  id: deployment
       # uses: actions/deploy-pages@v4
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # 锁定稳定版 Node 环境

      # 💡 核心修改 1：移除之前的 cache: 'npm' 行，避免因为缺锁文件报错

      - name: Install dependencies
        run: npm install  # 💡 核心修改 2：把 npm ci 改成 npm install，它会自动兼容并生成环境

      - name: Build with Astro
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
